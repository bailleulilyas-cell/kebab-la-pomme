<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Découvrez la carte La Pomme Ermont : sandwichs, assiettes, grillades, burgers, pizzas, desserts et accompagnements.">
    <title>Notre Carte - La Pomme Ermont</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <header id="header-placeholder"></header>

    <main class="container menu-section">
        <div class="section-intro">
            <h1>Notre carte</h1>
            <p>Formules sandwichs incluant frites & boisson.</p>
        </div>

        <div class="menu-toolbar" role="region" aria-label="Filtres de la carte">
            <nav class="menu-tabs" aria-label="Catégories du menu">
                <button class="tab-btn active" data-cat="sandwichs">Sandwichs</button>
                <button class="tab-btn" data-cat="plats">Assiettes & Grillades</button>
                <button class="tab-btn" data-cat="burgers">Burgers & Pizzas</button>
                <button class="tab-btn" data-cat="autres">Accompagnements & Desserts</button>
            </nav>
            <label for="menu-search" class="menu-search-wrap">
                <span class="sr-only">Rechercher un plat</span>
                <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
                <input id="menu-search" type="search" placeholder="Rechercher un plat..." autocomplete="off">
            </label>
        </div>

        <p id="menu-count" class="menu-count" aria-live="polite"></p>
        <div id="menu-grid" class="menu-grid-aere"></div>
    </main>

    <footer id="footer-placeholder"></footer>
    <script src="script.js"></script>
</body>
</html>
